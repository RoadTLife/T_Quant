# 数据目录配置
data:
  data_dir: data/raw
  processed_dir: data/processed
  tushare_save_path: ./data/tushare
  auto_update: true
  update_interval_days: 7

# 数据库配置
database:
  host: localhost
  port: 3306
  user: root
  password: '123456'
  database: trade
  charset: utf8mb4

# 回测配置
backtest:
  initial_capital: 1000000.0
  lot_size: 100
  commission_rate: 0.0003
  min_trade_amount: 0.0
  commission: 0.001

# MACD策略配置
macd:
  short_period: 12
  long_period: 26
  signal_period: 9

# 交易配置
trading:
  api_key: ''
  api_secret: ''
  mode: backtest

# 日志配置
logging:
  level: INFO
  log_dir: logs
  tushare_log_file: logs/tushare.log

# 服务配置
server:
  port: 5001
  host: 0.0.0.0
  debug: true

# Tushare配置
tushare:
  token: ""
  timeout: 30
  retries: 3
  retry_interval: 2
  base_url: "https://api.waditu.com"

# 路径配置
paths:
  data_dir: ./data
  output_dir: ./outputs
  log_dir: ./logs